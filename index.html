<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="Split travel dinner costs fairly among whoever attended. Snap the invoice, pick who paid and who was there." />
  <title>TripSplit — Share travel costs</title>

  <!-- Social share cards (Open Graph / Twitter). For full support on all
       platforms, set the two URLs below to your absolute deployed URL. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="TripSplit" />
  <meta property="og:title" content="TripSplit — Split travel dinners fairly" />
  <meta property="og:description" content="Snap the invoice, tick who was there, and see who owes whom — city by city." />
  <meta property="og:image" content="og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TripSplit — Split travel dinners fairly" />
  <meta name="twitter:description" content="Snap the invoice, tick who was there, and see who owes whom — city by city." />
  <meta name="twitter:image" content="og-image.png" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Lightbox for viewing invoice photos full-screen -->
  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="Invoice photo">
    <button class="lightbox__close" aria-label="Close">&times;</button>
    <img id="lightboxImg" alt="Invoice" />
  </div>

  <!-- Toast notifications -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
