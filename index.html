<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="Split travel dinner costs fairly among whoever attended. Snap the invoice, pick who paid and who was there." />
  <title>TripSplit — Share travel costs</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Lightbox for viewing invoice photos full-screen -->
  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="Invoice photo">
    <button class="lightbox__close" aria-label="Close">&times;</button>
    <img id="lightboxImg" alt="Invoice" />
  </div>

  <!-- Toast notifications -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
