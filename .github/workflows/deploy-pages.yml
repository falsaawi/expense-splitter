name: Deploy to GitHub Pages

# Publishes the static app to GitHub Pages on every push to this branch.
on:
  push:
    branches: ["claude/determined-dirac-0qoxhn"]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to enable + publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
